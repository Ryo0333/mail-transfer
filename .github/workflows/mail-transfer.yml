name: Mail Transfer

on:
  schedule:
    - cron: '0 17 * * 1'  # 毎週火曜 2:00 JST (UTC 17:00 月曜)
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest

    env:
      DOTENV_PRIVATE_KEY_ENCRYPTED: ${{ secrets.DOTENV_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dotenvx
        run: curl -fsS https://dotenvx.com/install.sh | sh

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run mail transfer
        run: dotenvx run -f .env.encrypted -- uv run python main.py
